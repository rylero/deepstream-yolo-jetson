services:
  deepstream-vision:
    image: deepstream-yolo-jetson:latest
    build:
      context: .
      dockerfile: Dockerfile
      args: {}
    runtime: nvidia
    environment:
      - NT_TEAM_NUMBER=${NT_TEAM_NUMBER:-0}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      # Set VIDEO_URI to use a file/RTSP source instead of the USB camera.
      # Unset (or empty) = v4l2src /dev/video0
      # Example: VIDEO_URI=file:///opt/nvidia/deepstream/deepstream/samples/streams/sample_1080p_h264.mp4
      - VIDEO_URI=${VIDEO_URI:-}
      - NUM_CAMERAS=${NUM_CAMERAS:-2}
      # Comma-separated capture device paths. USB cameras expose 2 nodes each
      # (video + metadata), so camera 0=/dev/video0, camera 1=/dev/video2, etc.
      # Run: v4l2-ctl --list-devices   on the Jetson to confirm your paths.
      - CAMERA_DEVICES=${CAMERA_DEVICES:-/dev/video0,/dev/video2}
    devices:
      - /dev/video0:/dev/video0   # USB camera 0 (capture)
      - /dev/video1:/dev/video1   # USB camera 0 (metadata — harmless to pass through)
      - /dev/video2:/dev/video2   # USB camera 1 (capture)
      - /dev/video3:/dev/video3   # USB camera 1 (metadata)
    volumes:
      - model_cache:/opt/deepstream/models        # Caches ONNX + TRT engine across restarts
      - ./config:/opt/deepstream/config:ro        # Live config — no rebuild needed for changes
      - ./640-yolo11s-fp32.pt:/opt/deepstream/models/custom_model.pt:ro  # Custom trained model
    restart: no
    # host networking is required so NT4 can reach the roboRIO on the FRC field subnet
    network_mode: host

volumes:
  model_cache:
